name: Feature Request
description: Suggest a new feature or enhancement for cuid.net
title: '[Feature]: '
labels: ['enhancement', 'needs-review']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
      placeholder: I'd like to be able to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered
      placeholder: I've also thought about...
    validations:
      required: false

  - type: dropdown
    id: api-area
    attributes:
      label: API Area
      description: Which part of the library would this feature affect?
      multiple: true
      options:
        - Cuid (v1)
        - Cuid2 (v2)
        - New CUID version support
        - JSON Serialization (System.Text.Json)
        - JSON Serialization (Newtonsoft.Json)
        - XML Serialization
        - Equality / Comparison
        - Parsing / Validation
        - Performance Optimization
        - Documentation
        - Other
    validations:
      required: false

  - type: textarea
    id: example
    attributes:
      label: Example Usage
      description: Show how you'd like to use this feature
      render: csharp
      placeholder: |
        using Visus.Cuid;

        var id = Cuid2.Generate();
        // Your proposed API usage here
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Nice to have
        - Important for my use case
        - Critical blocker
    validations:
      required: true

  - type: dropdown
    id: breaking-change
    attributes:
      label: Breaking Change
      description: Would this feature require breaking changes to the API?
      options:
        - No - Backward compatible
        - Yes - Breaking change required
        - Not sure
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or examples
      placeholder: Any additional information that might be helpful
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to ensure this feature hasn't been requested already
          required: true
        - label: This feature aligns with the library's goals (security, performance, standards compliance)
          required: false
        - label: I am willing to contribute this feature via a pull request
          required: false
